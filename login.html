<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <tittle>Demon Slayer</tittle>
        <link rel="stylesheet" type="text/css" href="login-style.css">
    </head>
    <body>
        <main class="main-container">
            <section class="first-container">
                <img class="image" src="https://static.wikia.nocookie.net/kimetsu-no-yaiba/images/0/0e/Nezuko_anime_right_face.png/revision/latest?cb=20241228000758" alt="imagen principal">
            </section>

            <section class="second-container">
                <form>
                        <img class="icono" src="https://i.pinimg.com/originals/a1/87/c6/a187c6e2e8dc518eb53b0777555a23ce.jpg" alt="Icono login">
                        <label>Usuario</label>
                        <input type="text" name="user" placeholder="Usuario">
                        <label>Contraseña</label>
                        <input type="password" name="pass" placeholder="Contraseña">
                        <button>login</button>
                </form>
            </section>
        </main>
    </body>
</html>
